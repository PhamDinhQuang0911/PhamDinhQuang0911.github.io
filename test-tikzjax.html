<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>
</head>
<body>
    <h2>Test Basic TikZ</h2>
    <script type="text/tikz">
        \begin{tikzpicture}
            \draw (0,0) circle (1cm);
        \end{tikzpicture}
    </script>
    <h2>Test tkz-euclide</h2>
    <script type="text/tikz">
        \usepackage{tkz-euclide}
        \begin{tikzpicture}
            \tkzDefPoint(0,0){A}
            \tkzDefPoint(4,0){B}
            \tkzDrawSegment(A,B)
            \tkzDrawPoints(A,B)
        \end{tikzpicture}
    </script>
</body>
</html>
